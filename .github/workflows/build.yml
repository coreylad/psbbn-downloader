name: Build PSBBN Downloader

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    name: Build ELF
    runs-on: ubuntu-latest
    container:
      image: ps2dev/ps2dev:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          set -e
          apk add --no-cache make git curl wget bash gmp
          if ! apk add --no-cache mpfr4; then
            apk add --no-cache mpfr
          fi
          if ! apk add --no-cache libmpc; then
            apk add --no-cache mpc1
          fi

      - name: Set up PS2DEV PATH
        run: |
          echo "$PS2DEV/bin"     >> $GITHUB_PATH
          echo "$PS2DEV/ee/bin"  >> $GITHUB_PATH
          echo "$PS2DEV/iop/bin" >> $GITHUB_PATH

      - name: Verify toolchain
        run: |
          echo "PS2DEV = $PS2DEV"
          echo "PS2SDK = $PS2SDK"
          mips64r5900el-ps2-elf-gcc --version
          CC1_PATH="$(mips64r5900el-ps2-elf-gcc -print-prog-name=cc1)"
          echo "cc1 = $CC1_PATH"
          ldd "$CC1_PATH" | tee /tmp/cc1-ldd.txt
          if grep -q "not found" /tmp/cc1-ldd.txt; then
            echo "ERROR: Missing shared-library dependencies for cc1"
            exit 1
          fi

      - name: Install gsKit if missing
        run: |
          set -e
          export PS2DEV="${PS2DEV:-/usr/local/ps2dev}"
          export PS2SDK="${PS2SDK:-$PS2DEV/ps2sdk}"

          if [ -f "$PS2DEV/gsKit/include/gsFont.h" ]; then
            echo "gsKit already present at $PS2DEV/gsKit"
          else
            echo "gsKit not found; building from source..."
            rm -rf /tmp/gsKit
            git clone --depth=1 https://github.com/ps2dev/gsKit.git /tmp/gsKit
            make -C /tmp/gsKit
            make -C /tmp/gsKit install
          fi

          test -f "$PS2DEV/gsKit/include/gsFont.h"

      - name: Fetch vendored sources
        run: make fetch-deps

      - name: Build
        run: make all -j$(nproc)

      - name: Show artifact info
        run: |
          ls -lh psbbn-downloader.elf
          mips64r5900el-ps2-elf-readelf -h psbbn-downloader.elf | grep -E 'Type|Entry|Size'

      - name: Upload ELF artifact
        uses: actions/upload-artifact@v4
        with:
          name: psbbn-downloader-${{ github.sha }}
          path: |
            psbbn-downloader.elf
          retention-days: 90

      - name: Create release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: psbbn-downloader.elf

  lint:
    name: Lint C sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck
      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,style,performance \
                   --suppress=missingIncludeSystem \
                   --suppress=constParameterCallback \
                   --error-exitcode=1 \
                   -Isrc \
                   src/
