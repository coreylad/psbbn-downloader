name: Build PSBBN Downloader

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    name: Build ELF
    runs-on: ubuntu-latest
    container:
      image: ps2dev/ps2dev:latest

    steps:
      - name: Install git
        run: apk add --no-cache git

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apk add --no-cache make git curl wget bash

      - name: Set up PS2DEV PATH
        run: |
          echo "$PS2DEV/bin"     >> $GITHUB_PATH
          echo "$PS2DEV/ee/bin"  >> $GITHUB_PATH
          echo "$PS2DEV/iop/bin" >> $GITHUB_PATH

      - name: Verify toolchain
        run: |
          echo "PS2DEV = $PS2DEV"
          echo "PS2SDK = $PS2SDK"
          ee-gcc --version
          mips64r5900el-ps2-elf-gcc --version || true

      - name: Fetch vendored sources
        run: make fetch-deps

      - name: Build
        run: make all -j$(nproc)

      - name: Show artifact info
        run: |
          ls -lh psbbn-downloader.elf
          ee-readelf -h psbbn-downloader.elf | grep -E 'Type|Entry|Size'

      - name: Upload ELF artifact
        uses: actions/upload-artifact@v4
        with:
          name: psbbn-downloader-${{ github.sha }}
          path: |
            psbbn-downloader.elf
          retention-days: 90

      - name: Create release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: psbbn-downloader.elf

  lint:
    name: Lint C sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck
      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,style,performance \
                   --suppress=missingIncludeSystem \
                   --suppress=constParameterCallback \
                   --error-exitcode=1 \
                   -Isrc \
                   src/
